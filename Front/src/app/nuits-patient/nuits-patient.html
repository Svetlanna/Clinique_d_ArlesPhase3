<div class="shell">
  <app-sidebar></app-sidebar>

  <div class="main">
    <div class="content">
      <div class="card">
        <div class="card-hd">
          <span class="card-hd-title">Nuits patients ({{ nuits.length }})</span>
        </div>

        <table class="tbl">
          <thead>
            <tr>
              <th>ID</th>
              <th>Patient</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Médecin</th>
            </tr>
          </thead>
          <tbody>
            @if (nuits.length > 0) {
              @for (n of nuits; track n.id_nuit) {
                <tr>
                  <td>{{ n.id_nuit }}</td>
                  <td>{{ n.nom_patient ?? n.id_patient }}</td>
                  <td>{{ n.date_nuit | date:'dd/MM/yyyy' }}</td>
                  <td>{{ n.statut }}</td>
                  <td>{{ n.nom_medecin ?? n.id_medecin }}</td>
                </tr>
              }
            } @else {
              <tr>
                <td colspan="5" style="text-align:center;padding:24px;color:var(--text-tertiary)">
                  Chargement...
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
