<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">

<div class="shell">
  <app-sidebar></app-sidebar>


  <div class="main">
    <div class="topbar">

      <div class="topbar-right">
        <button class="icon-btn notif" aria-label="Notifications"><i class="ti ti-bell"></i></button>
        <button class="icon-btn" aria-label="Recherche"><i class="ti ti-search"></i></button>
        <button class="icon-btn" aria-label="Aide"><i class="ti ti-help-circle"></i></button>
        <div class="avatar" style="width:34px;height:34px;font-size:12px">
          {{ user()?.data?.login?.substring(0,2)?.toUpperCase() || 'JL' }}
        </div>
      </div>
    </div>


      <div class="row2">
        <div class="card">
          <div class="card-hd">
            <div class="legend">
              <img src="/courbe_spo2_nuit_1.png" height="480" width="640"/>

              <img src="/courbe_spo2_nuit_2.png" height="480" width="640"/></div>
          </div>
          <div class="chart-wrap">
            <canvas id="revChart"></canvas>
          </div>
        </div>

      <div class="row2">
        <div class="card">


          <img src="/ronflements1_vs_temps.png" height="480" width="640"/>
          <img src="/ronflements2_vs_temps.png" height="480" width="640"/>

        </div>

        <div class="card">
          <div class="card-hd">
            <span class="card-hd-title">Nouveaux utilisateurs</span>
            <span class="card-hd-action">Gérer</span>
          </div>
          <div>
            <div class="user-row">
              <img src="/courbe_debit_nasal_nuit_1.png" height="480" width="640"/>
            </div>
           <div class="user-row">
              <img src="/courbe_debit_nasal_nuit_2.png" height="480" width="640"/>
           </div>






        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
