<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">

<div class="shell">
  <app-sidebar></app-sidebar>


  <div class="main">
    <div class="topbar">

      <div class="topbar-right">
        <button class="icon-btn notif" aria-label="Notifications"><i class="ti ti-bell"></i></button>
        <button class="icon-btn" aria-label="Recherche"><i class="ti ti-search"></i></button>
        <button class="icon-btn" aria-label="Aide"><i class="ti ti-help-circle"></i></button>
        <div class="avatar" style="width:34px;height:34px;font-size:12px">
          {{ user()?.data?.login?.substring(0,2)?.toUpperCase() || 'JL' }}
        </div>
      </div>
    </div>

    <div class="content">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label"><i class="ti ti-coin" style="font-size:14px"></i>Revenus</div>
          <div class="metric-val">91 400 €</div>
          <div class="metric-delta up">↑ 14,2 % ce mois</div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-shopping-bag" style="font-size:14px"></i>Commandes</div>
          <div class="metric-val">2 348</div>
          <div class="metric-delta up">↑ 8,7 %</div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-users" style="font-size:14px"></i>Utilisateurs actifs</div>
          <div class="metric-val">18 921</div>
          <div class="metric-delta up">↑ 3,1 %</div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-receipt-refund" style="font-size:14px"></i>Taux de remb.</div>
          <div class="metric-val">2,4 %</div>
          <div class="metric-delta down">↑ 0,3 %</div>
        </div>
      </div>

      <div class="row2">
        <div class="card">
          <div class="card-hd">
            <div class="legend">
              <img src="/courbe_spo2_nuit_1.png" height="480" width="640"/>

              <img src="/courbe_spo2_nuit_2.png" height="480" width="640"/></div>
          </div>
          <div class="chart-wrap">
            <canvas id="revChart"></canvas>
          </div>
        </div>
        <div class="card">



          <div class="card-hd">
            <span class="card-hd-title">Statut des commandes</span>
          </div>
          <div class="chart-wrap">
            <canvas id="statusChart"></canvas>
          </div>
          <div class="legend" style="margin-top:10px;flex-wrap:wrap">
            <span><span class="lsq" style="background:#534AB7"></span>Terminées 62%</span>
            <span><span class="lsq" style="background:#9FE1CB"></span>En attente 21%</span>
            <span><span class="lsq" style="background:#FAC775"></span>En cours 11%</span>
            <span><span class="lsq" style="background:#F09595"></span>Annulées 6%</span>
          </div>



        </div>
      </div>

      <div class="row2">
        <div class="card">


          <img src="/ronflements1_vs_temps.png" height="480" width="640"/>
          <img src="/ronflements2_vs_temps.png" height="480" width="640"/>

        </div>

        <div class="card">
          <div class="card-hd">
            <span class="card-hd-title">Nouveaux utilisateurs</span>
            <span class="card-hd-action">Gérer</span>
          </div>
          <div>
            <div class="user-row">
              <img src="/courbe_debit_nasal_nuit_1.png" height="480" width="640"/>
            </div>
           <div class="user-row">
              <img src="/courbe_debit_nasal_nuit_2.png" height="480" width="640"/>
           </div>






        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
